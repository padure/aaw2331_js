<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validarea datei</title>
</head>
<body>
    <h3> Introdu data</h3>
    <input type="text" id="data" placeholder="dd/mm/yyyy">
    <button onclick="VerificaData()">Verifica</button>
    <p id="rezultat"></p>
    <script>
        function VerificaData(){
            let data=document.getElementById("data").value;
            let regex=/^(0[1-9]|[12][0-9]|3[01])\/(0[1-9]|1[0-2])\/[0-9]{4}$/;
            if(regex.test(data)){
                document.getElementById("rezultat").innerHTML="Data valida";
            }
            else{
                document.getElementById("rezultat").innerHTML="Data invalida";
            }
            
        }

    </script>
</body>
</html>
