<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectia 12</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <nav
        class="relative bg-gray-800 dark:bg-gray-800/50 dark:after:pointer-events-none dark:after:absolute dark:after:inset-x-0 dark:after:bottom-0 dark:after:h-px dark:after:bg-white/10">
        <div class="mx-auto max-w-7xl px-2 sm:px-6 lg:px-8">
            <div class="relative flex h-16 items-center justify-between">
                <div class="absolute inset-y-0 left-0 flex items-center sm:hidden">
                    <!-- Mobile menu button-->
                    <button type="button" command="--toggle" commandfor="mobile-menu"
                        class="relative inline-flex items-center justify-center rounded-md p-2 text-gray-400 hover:bg-white/5 hover:text-white focus:outline-2 focus:-outline-offset-1 focus:outline-indigo-500">
                        <span class="absolute -inset-0.5"></span>
                        <span class="sr-only">Open main menu</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" data-slot="icon"
                            aria-hidden="true" class="size-6 in-aria-expanded:hidden">
                            <path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" data-slot="icon"
                            aria-hidden="true" class="size-6 not-in-aria-expanded:hidden">
                            <path d="M6 18 18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </button>
                </div>
                <div class="flex flex-1 items-center justify-center sm:items-stretch sm:justify-start">
                    <div class="flex shrink-0 items-center">
                        <img src="https://tailwindcss.com/plus-assets/img/logos/mark.svg?color=indigo&shade=500"
                            alt="Your Company" class="h-8 w-auto" />
                    </div>
                    <div class="hidden sm:ml-6 sm:block">
                        <div class="flex space-x-4">
                            <a href="./index.html" aria-current="page"
                                class="rounded-md px-3 py-2 text-sm font-medium text-white dark:bg-gray-950/50">Carti</a>
                            <a href="./create.html" aria-current="page"
                                class="rounded-md bg-gray-900 px-3 py-2 text-sm font-medium text-white dark:bg-gray-950/50">Adauga</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <el-disclosure id="mobile-menu" hidden class="block sm:hidden">
            <div class="space-y-1 px-2 pt-2 pb-3">
                <a href="./index.html" aria-current="page"
                    class="block rounded-md px-3 py-2 text-base font-medium text-white dark:bg-gray-950/50">Carti</a>
                <a href="./create.html" aria-current="page"
                    class="block rounded-md bg-gray-900 px-3 py-2 text-base font-medium text-white dark:bg-gray-950/50">Adauga</a>
            </div>
        </el-disclosure>
    </nav>

    <div class="container w-full md:w-2/5 m-auto">
        <h2 class="text-2xl font-bold text-gray-800 text-center mt-8">Adaugă o carte</h2>
        <form action="#" method="post" id="add_book"
            class="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-lg space-y-6">

            <div>
                <label for="title" class="block text-sm font-medium text-gray-700">Titlu</label>
                <input type="text" id="title" name="title"
                    class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                    placeholder="Ex: Umbrele Timpului" required>
            </div>

            <div>
                <label for="author" class="block text-sm font-medium text-gray-700">Autor</label>
                <input type="text" id="author" name="author"
                    class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                    placeholder="Ex: Andrei Popescu" required>
            </div>

            <div>
                <label for="pages" class="block text-sm font-medium text-gray-700">Număr pagini</label>
                <input type="number" id="pages" name="pages"
                    class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                    placeholder="Ex: 320" min="1" required>
            </div>

            <div>
                <label for="description" class="block text-sm font-medium text-gray-700">Descriere</label>
                <textarea id="description" name="description" rows="4" name="description"
                    class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                    placeholder="Descrierea cărții..."></textarea>
            </div>

            <div>
                <button type="submit"
                    class="w-full bg-gray-800 text-white py-2 px-4 rounded-xl hover:bg-gray-700 transition duration-200 font-semibold">
                    Salvează cartea
                </button>
            </div>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script>
    <script src="./js/create.js" type="module"></script>
</body>

</html>
