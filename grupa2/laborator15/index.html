<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laborator 15</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div class="w-2/3 shadow m-auto mt-6 p-2">
        <h4 class="font-semibold text-xl m-2">
            Sarcini practice pentru exersarea evenimentelor în JavaScript
        </h4>
        <!-- Sarcina 1 -->
        <section class="p-2 shadow bg-sky-50/50 mb-2">
            <h5 class="font-semibold text-lg">Sarcina 1</h5>
            <div class="w-50 h-50 bg-sky-500" id="sarcina-1"></div>
        </section>
        <!-- Sarcina 2 -->
        <section class="p-2 shadow bg-sky-50/50 mb-2">
            <h5 class="font-semibold text-lg">Sarcina 2</h5>
            <p class="mt-2 text-sm text-slate-600">
                Mișcă cursorul peste o zonă definită
            </p>
            <div id="mouseArea" class="mt-6 h-80 w-full flex items-center justify-center shadow bg-sky-100/50">
                <p id="message" class="text-center text-slate-600">Aceasta este zona definită</p>
            </div>
        </section>
        <!-- Sarcina 3 -->
        <section class="p-2 shadow bg-sky-50/50 mb-2">
            <h5 class="font-semibold text-lg">Sarcina 3</h5>
            <div class="overflow-hidden h-[320px] w-[520px] shadow-lg shadow-sky-800/70">
                <img 
                    id="image"
                    src="./images/image.jpg" 
                    alt="Peisaj"
                    class="h-[320px] w-[520px] object-cover transition duration-500"
                >
            </div>
        </section> 
        <!-- Sarcina 4 -->
        <section class="p-2 shadow bg-sky-50/50 mb-2">
            <h5 class="font-semibold text-lg">Sarcina 4</h5>
            <div 
                id="menu" 
                class="relative flex h-80 items-center justify-center border-2 border-dashed border-sky-300 bg-sky-100/50">
                <p>Click dreapta în acestă zonă</p>
                <div id="menu_items" class="absolute hidden min-w-[180px] boder border-sky-200 bg-white p-2 shadow flex flex-col items-start">
                    <button class="border-1 border-sky-100 p-1 w-full text-left hover:bg-sky-100">Copy</button>
                    <button class="border-1 border-sky-100 p-1 w-full text-left hover:bg-sky-100">Paste</button>
                    <button class="border-1 border-sky-100 p-1 w-full text-left hover:bg-sky-100">Cut</button>
                </div>
            </div>
        </section>
    </div>
    <script src="./js/app.js"></script>
</body>
</html>
