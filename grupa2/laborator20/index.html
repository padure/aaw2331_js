<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laborator 20</title>
    <link rel="stylesheet" href="./css/app.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-dvh bg-teal-700 flex justify-center items-center">
    <main class="w-full md:w-5/6 lg:w-2/3 m-2 md:m-0">
        <section class="p-2 border border-teal-300 text-center md:text-right mb-2">
            <button 
                id="double" 
                class="bg-teal-700 text-teal-300 outline-offset-2 outline-teal-500 focus:outline-2 text-xl py-2 px-5 border rounded-md hover:bg-teal-600"
            >
                Double
            </button>
            <button 
                id="clear" 
                class="bg-teal-700 text-teal-300 outline-offset-2 outline-teal-500 focus:outline-2 text-xl py-2 px-5 border rounded-md hover:bg-teal-600"
            >
                Clear
            </button>
        </section>
        <section class="flex flex-wrap gap-2">
            <div class="card border border-teal-300 w-[300px] grow h-50 bg-teal-600 text-teal-300"></div>
            <div class="card border border-teal-300 w-[300px] grow h-50 bg-teal-600 text-teal-300"></div>
            <div class="card border border-teal-300 w-[300px] grow h-50 bg-teal-600 text-teal-300"></div>
            <div class="card border border-teal-300 w-[300px] grow h-50 bg-teal-600 text-teal-300"></div>
            <div class="card border border-teal-300 w-[300px] grow h-50 bg-teal-600 text-teal-300"></div>
            <div class="card border border-teal-300 w-[300px] grow h-50 bg-teal-600 text-teal-300"></div>
            <div class="card border border-teal-300 w-[300px] grow h-50 bg-teal-600 text-teal-300"></div>
            <div class="card border border-teal-300 w-[300px] grow h-50 bg-teal-600 text-teal-300"></div>
            <div class="card border border-teal-300 w-[300px] grow h-50 bg-teal-600 text-teal-300"></div>
            <div class="card border border-teal-300 w-[300px] grow h-50 bg-teal-600 text-teal-300"></div>
            <div class="card border border-teal-300 w-[300px] grow h-50 bg-teal-600 text-teal-300"></div>
            <div class="card border border-teal-300 w-[300px] grow h-50 bg-teal-600 text-teal-300"></div>
        </section>
        <section id="total"class="text-teal-300 text-xl p-2 my-2 text-center border border-teal-300">
            Total: 0
        </section>
    </main>
    <script src="./js/app.js"></script>
</body>
</html>
